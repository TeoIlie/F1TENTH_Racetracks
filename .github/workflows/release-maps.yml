name: Release Maps

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Package maps
              run: |
                  mkdir -p archives
                  for dir in */; do
                      name="${dir%/}"
                      # Skip hidden dirs and .github
                      [[ "$name" == .* ]] && continue
                      tar -cJf "archives/${name}.tar.xz" "$name"
                      echo "Packaged: $name"
                  done

            - name: Create release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ github.ref_name }}" \
                  archives/*.tar.xz \
                  --title "Maps ${{ github.ref_name }}" \
                  --notes "Auto-generated track map archives"
